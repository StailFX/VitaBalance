name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/stailfx/vita-balance

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Rebuild and restart WITHOUT killing the DB
            # docker compose up recreates only changed containers
            # The DB stays running thanks to healthcheck + depends_on
            docker compose up -d --build --remove-orphans

            # Wait for DB healthcheck + backend startup (up to 30s)
            echo "Waiting for services to be ready..."
            for i in $(seq 1 30); do
              if docker compose exec -T backend python -c "print('ok')" 2>/dev/null; then
                echo "Backend ready after ${i}s"
                break
              fi
              sleep 1
            done

            # Run seed (adds new data if any)
            docker compose exec -T backend python -m app.seed

            echo "Deploy completed at $(date)"
