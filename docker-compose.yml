services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vitamin_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vitamin_pass}
      POSTGRES_DB: ${POSTGRES_DB:-vitamin_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-vitamin_user}:${POSTGRES_PASSWORD:-vitamin_pass}@db:5432/${POSTGRES_DB:-vitamin_db}"
      DATABASE_URL_SYNC: "postgresql+psycopg2://${POSTGRES_USER:-vitamin_user}:${POSTGRES_PASSWORD:-vitamin_pass}@db:5432/${POSTGRES_DB:-vitamin_db}"
    ports:
      - "8000:8000"
    networks:
      - app-network

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
