services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vitamin_user
      POSTGRES_PASSWORD: vitamin_pass
      POSTGRES_DB: vitamin_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://vitamin_user:vitamin_pass@db:5432/vitamin_db"
      DATABASE_URL_SYNC: "postgresql+psycopg2://vitamin_user:vitamin_pass@db:5432/vitamin_db"
    ports:
      - "8000:8000"
    networks:
      - app-network

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
